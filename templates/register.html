{% extends "base.html" %}
{% block title %}Register - FinanceWise{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="card auth-card p-4 shadow">
    <div class="text-center mb-3">
      <i class="bi bi-piggy-bank-fill" style="font-size:2.5rem;color:#0f6b52;"></i>
      <h3 class="fw-bold mt-2">Create your account</h3>
      <p class="text-muted">Start your financial literacy journey</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="full_name" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required minlength="6">
      </div>
      <button type="submit" class="btn btn-fw-primary w-100">Create Account</button>
    </form>

    <p class="text-center mt-3 mb-0">
      Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
