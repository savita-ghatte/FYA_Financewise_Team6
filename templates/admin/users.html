{% extends "base.html" %}
{% block title %}Manage Users - FinanceWise{% endblock %}
{% block content %}

<h3 class="fw-bold mb-4"><i class="bi bi-people"></i> Manage Users</h3>

<div class="card p-3">
  {% if users %}
  <table class="table align-middle">
    <thead><tr><th>Name</th><th>Email</th><th>Joined</th><th></th></tr></thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td>{{ u.full_name }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.created_at }}</td>
        <td class="text-end">
          <form method="POST" action="{{ url_for('admin_delete_user', user_id=u.id) }}"
                onsubmit="return confirm('Remove this user account? This cannot be undone.');">
            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i> Remove</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <p class="text-muted">No registered users yet.</p>
  {% endif %}
</div>

{% endblock %}
