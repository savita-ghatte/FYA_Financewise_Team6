{% extends "base.html" %}
{% block title %}{{ lesson.title }} - FinanceWise{% endblock %}
{% block content %}

<a href="{{ url_for('lessons') }}" class="text-decoration-none">&larr; Back to lessons</a>

<div class="card p-4 mt-3">
  <span class="badge bg-success-subtle text-success-emphasis mb-2" style="width:fit-content;">{{ lesson.category }}</span>
  <h3 class="fw-bold">{{ lesson.title }}</h3>
  <p class="mt-3" style="line-height:1.8;">{{ lesson.content }}</p>

  <div class="d-flex gap-2 mt-4">
    <form method="POST" action="{{ url_for('complete_lesson', lesson_id=lesson.id) }}">
      <button type="submit" class="btn btn-fw-primary"><i class="bi bi-check-circle"></i> Mark as Complete</button>
    </form>
    <a href="{{ url_for('quiz', lesson_id=lesson.id) }}" class="btn btn-outline-secondary">
      <i class="bi bi-patch-question"></i> Take Quiz
    </a>
  </div>
</div>

{% endblock %}
